<!DOCTYPE html>
<html lang="ru">
<head>
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YDZT9L2SKC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YDZT9L2SKC');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — Адвокат КР</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Mulish:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Mulish',sans-serif;background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 100%);color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:450px;width:100%}
.logo{width:100px;height:100px;margin:0 auto 24px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:25px;display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 10px 40px rgba(245,158,11,0.3)}
h1{font-family:'Playfair Display',serif;font-size:2rem;color:#f59e0b;margin-bottom:8px;text-align:center}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:40px;font-size:0.9rem}
.card{background:rgba(26,31,58,0.8);border:1px solid rgba(148,163,184,0.2);border-radius:20px;padding:40px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.form-group{margin-bottom:24px}
label{display:block;color:#cbd5e1;margin-bottom:8px;font-weight:600;font-size:0.9rem}
input{width:100%;padding:14px 16px;background:rgba(15,23,42,0.6);border:2px solid rgba(148,163,184,0.2);border-radius:12px;color:#e2e8f0;font-size:1rem;transition:all 0.2s;font-family:'Mulish',sans-serif}
input:focus{outline:none;border-color:#3b82f6;background:rgba(15,23,42,0.8)}
input::placeholder{color:#64748b}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:12px;color:white;font-weight:700;font-size:1.1rem;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 20px rgba(59,130,246,0.4);margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(59,130,246,0.5)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.btn-secondary{background:transparent;border:2px solid rgba(148,163,184,0.3);color:#cbd5e1;box-shadow:none;margin-top:12px}
.btn-secondary:hover{border-color:#3b82f6;background:rgba(59,130,246,0.1);box-shadow:none}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);padding:12px 16px;border-radius:8px;color:#fca5a5;font-size:0.9rem;margin-bottom:20px;display:none}
.error.show{display:block}
.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);padding:12px 16px;border-radius:8px;color:#6ee7b7;font-size:0.9rem;margin-bottom:20px;display:none}
.success.show{display:block}
.info{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);padding:12px 16px;border-radius:8px;color:#60a5fa;font-size:0.9rem;margin-bottom:20px;display:none}
.info.show{display:block}
.divider{text-align:center;color:#64748b;margin:24px 0;position:relative}
.divider:before,.divider:after{content:'';position:absolute;top:50%;width:40%;height:1px;background:rgba(148,163,184,0.2)}
.divider:before{left:0}
.divider:after{right:0}
.links{text-align:center;margin-top:24px;font-size:0.9rem}
.links a{color:#3b82f6;text-decoration:none;font-weight:600}
.links a:hover{text-decoration:underline}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,14,39,0.9);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.loading.show{display:flex}
.spinner{width:50px;height:50px;border:4px solid rgba(59,130,246,0.3);border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite}
.loading-text{color:#60a5fa;font-size:0.9rem}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
@media(max-width:768px){
.card{padding:30px 24px}
h1{font-size:1.75rem}
}
</style>
</head>
<body>

<div class="loading" id="loading">
<div class="spinner"></div>
<div class="loading-text" id="loadingText">Загрузка...</div>
</div>

<div class="container">
<div class="logo">⚖️</div>
<h1>Вход в систему</h1>
<p class="subtitle">Адвокат КР — Подготовка к экзамену</p>

<div class="card">
<div class="error" id="error"></div>
<div class="success" id="success"></div>
<div class="info" id="info"></div>

<!-- Форма входа -->
<form onsubmit="handleLogin(event)" id="loginForm">
<div class="form-group">
<label for="username">👤 Логин</label>
<input type="text" id="username" placeholder="Введите ваш логин" required autocomplete="username">
</div>

<div class="form-group">
<label for="password">🔒 Пароль</label>
<input type="password" id="password" placeholder="Введите ваш пароль" required autocomplete="current-password">
</div>

<button type="submit" class="btn" id="loginBtn">🚀 Войти</button>
</form>

<!-- Форма активации (при первом входе) -->
<form onsubmit="handleActivation(event)" id="activationForm" class="hidden">
<div class="info show">
🔐 Первый вход на этом устройстве.<br>
Введите код активации от администратора.
</div>
<div class="form-group">
<label for="activationCode">🔑 Код активации</label>
<input type="text" id="activationCode" placeholder="Например: ACT-12345" required>
<small style="color:#94a3b8;font-size:0.85rem;display:block;margin-top:8px">
Код получите у администратора
</small>
</div>
<button type="submit" class="btn">✅ Активировать</button>
<button type="button" class="btn btn-secondary" onclick="cancelActivation()">← Назад</button>
</form>

<div class="divider">или</div>

<button class="btn btn-secondary" onclick="tryDemo()">🎓 Попробовать демо-версию</button>

<div class="links">
<a href="index.html">← Вернуться на главную</a>
</div>
</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBQD4IERaH6lW-TKs03giyUy9IL2UbT5OQ",
  authDomain: "advokat-kg.firebaseapp.com",
  projectId: "advokat-kg",
  storageBucket: "advokat-kg.firebasestorage.app",
  messagingSenderId: "13056866047",
  appId: "1:13056866047:web:6ac7b7a7eb4f3c5326beca"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Включаем оффлайн persistence для надежности
db.enablePersistence()
  .catch((err) => {
    if (err.code == 'failed-precondition') {
      console.warn('Persistence не может быть включен (несколько вкладок открыто)');
    } else if (err.code == 'unimplemented') {
      console.warn('Persistence не поддерживается браузером');
    }
  });

// Проверка подключения к Firebase
db.collection('users').limit(1).get()
  .then(() => {
    console.log('✅ Подключение к Firebase установлено');
  })
  .catch((error) => {
    console.error('❌ Ошибка подключения к Firebase:', error);
    showError('❌ Не удалось подключиться к серверу. Проверьте интернет-соединение.');
  });

let currentUsername = '';
let currentUserData = null;

// Инициализация админа
async function initializeAdmin(){
try{
const adminDoc = await db.collection('users').doc('admin').get();
if(!adminDoc.exists){
await db.collection('users').doc('admin').set({
password: 'admin2024',
role: 'admin',
name: 'Администратор',
created: new Date().toISOString(),
devices: [] // Админ может входить с любых устройств
});
}
}catch(e){
console.error('Ошибка инициализации:', e);
}
}

initializeAdmin();

function showLoading(show, text = 'Загрузка...'){
document.getElementById('loading').classList.toggle('show', show);
document.getElementById('loadingText').textContent = text;
}

function showError(msg){
const el = document.getElementById('error');
el.textContent = msg;
el.classList.add('show');
document.getElementById('success').classList.remove('show');
document.getElementById('info').classList.remove('show');
setTimeout(() => el.classList.remove('show'), 5000);
}

function showSuccess(msg){
const el = document.getElementById('success');
el.textContent = msg;
el.classList.add('show');
document.getElementById('error').classList.remove('show');
document.getElementById('info').classList.remove('show');
}

function showInfo(msg){
const el = document.getElementById('info');
el.textContent = msg;
el.classList.add('show');
document.getElementById('error').classList.remove('show');
document.getElementById('success').classList.remove('show');
}

function showForm(formId){
['loginForm','activationForm'].forEach(id => {
document.getElementById(id).classList.add('hidden');
});
document.getElementById(formId).classList.remove('hidden');
}

function tryDemo(){
sessionStorage.setItem('user', 'demo');
db.collection('logs').add({
username: 'demo',
event: 'login_success',
details: 'Демо-доступ',
timestamp: new Date().toISOString(),
userAgent: navigator.userAgent
}).catch(e => console.error('Лог ошибка:', e));
window.location.href = 'app-with-demo.html';
}

async function handleLogin(event){
event.preventDefault();
const username = document.getElementById('username').value.trim();
const password = document.getElementById('password').value;

if(username === 'demo'){
tryDemo();
return;
}

showLoading(true);

try {
const userDoc = await db.collection('users').doc(username).get();

if(!userDoc.exists){
showError('❌ Пользователь не найден');
await db.collection('logs').add({
username,
event: 'login_failed',
details: 'Пользователь не найден',
timestamp: new Date().toISOString(),
userAgent: navigator.userAgent
});
showLoading(false);
return;
}

const user = userDoc.data();

if(user.password !== password){
showError('❌ Неверный пароль');
await db.collection('logs').add({
username,
event: 'login_failed',
details: 'Неверный пароль',
timestamp: new Date().toISOString(),
userAgent: navigator.userAgent
});
showLoading(false);
return;
}

currentUsername = username;
currentUserData = user;

// Админ может входить с любых устройств без активации
if(user.role === 'admin'){
await completeLogin();
return;
}

// Проверяем устройство
const deviceFingerprint = getDeviceFingerprint();
const devices = user.devices || [];

// Проверка лимита устройств
if(devices.length >= 2 && !devices.some(d => d.fingerprint === deviceFingerprint)){
showError('❌ Превышен лимит устройств (максимум 2). Обратитесь к администратору для сброса.');
await db.collection('logs').add({
username,
event: 'login_failed',
details: 'Превышен лимит устройств',
timestamp: new Date().toISOString(),
userAgent: navigator.userAgent,
deviceFingerprint
});
showLoading(false);
return;
}

// Проверяем активировано ли это устройство
const deviceActivated = devices.some(d => d.fingerprint === deviceFingerprint && d.activated);

if(deviceActivated){
// Устройство уже активировано - входим сразу
await completeLogin();
} else {
// Новое устройство - нужна активация
showInfo('🔐 Первый вход на этом устройстве. Введите код активации от администратора.');
showForm('activationForm');
showLoading(false);
}

} catch(error) {
console.error('Ошибка входа:', error);
let errorMessage = '❌ Ошибка подключения к серверу';

// Более детальные сообщения об ошибках
if (error.code === 'unavailable') {
errorMessage = '❌ Нет подключения к интернету. Проверьте соединение.';
} else if (error.code === 'permission-denied') {
errorMessage = '❌ Ошибка доступа к базе данных. Обратитесь к администратору.';
} else if (error.code === 'not-found') {
errorMessage = '❌ База данных не найдена. Обратитесь к администратору.';
} else if (error.message) {
console.log('Детали ошибки:', error.message);
}

showError(errorMessage);
showLoading(false);
}
}

async function handleActivation(event){
event.preventDefault();
const code = document.getElementById('activationCode').value.trim().toUpperCase();

showLoading(true, 'Проверка кода...');

try {
// Проверяем код активации в Firebase
const codeDoc = await db.collection('activation_codes').doc(code).get();

if(!codeDoc.exists){
showError('❌ Неверный код активации');
showLoading(false);
return;
}

const codeData = codeDoc.data();

// Проверяем принадлежность кода
if(codeData.username !== currentUsername){
showError('❌ Этот код предназначен для другого пользователя');
showLoading(false);
return;
}

// Проверяем не использован ли код
if(codeData.used){
showError('❌ Код уже использован');
showLoading(false);
return;
}

// Проверяем срок действия (30 дней)
const codeAge = Date.now() - new Date(codeData.created).getTime();
if(codeAge > 30 * 24 * 60 * 60 * 1000){
showError('❌ Код истек. Запросите новый у администратора.');
showLoading(false);
return;
}

// Активируем устройство
const deviceFingerprint = getDeviceFingerprint();
const devices = currentUserData.devices || [];

devices.push({
fingerprint: deviceFingerprint,
activated: true,
activatedAt: new Date().toISOString(),
activationCode: code,
deviceInfo: navigator.userAgent.includes('Mobile') ? 'Мобильное устройство' : 'Компьютер'
});

// Обновляем пользователя
await db.collection('users').doc(currentUsername).update({
devices: devices
});

// Помечаем код как использованный
await db.collection('activation_codes').doc(code).update({
used: true,
usedAt: new Date().toISOString(),
usedDevice: deviceFingerprint
});

// Логируем
await db.collection('logs').add({
username: currentUsername,
event: 'device_activated',
details: `Устройство активировано кодом ${code}`,
timestamp: new Date().toISOString(),
deviceFingerprint
});

showSuccess('✅ Устройство активировано! Вход...');

setTimeout(() => completeLogin(), 1000);

} catch(error) {
console.error('Ошибка активации:', error);
showError('❌ Ошибка проверки кода');
showLoading(false);
}
}

async function completeLogin(){
// Логируем успешный вход
await db.collection('logs').add({
username: currentUsername,
event: 'login_success',
details: 'Вход выполнен',
timestamp: new Date().toISOString(),
userAgent: navigator.userAgent,
deviceType: navigator.userAgent.includes('Mobile') ? 'Mobile' : 'Desktop',
deviceFingerprint: getDeviceFingerprint()
});

// Обновляем lastLogin
await db.collection('users').doc(currentUsername).update({
lastLogin: new Date().toISOString(),
lastDevice: navigator.userAgent.includes('Mobile') ? 'Мобильное устройство' : 'Компьютер'
});

sessionStorage.setItem('user', currentUsername);
sessionStorage.setItem('userRole', currentUserData.role);
sessionStorage.setItem('userName', currentUserData.name);

showSuccess('✅ Вход выполнен! Перенаправление...');

setTimeout(() => {
if(currentUserData.role === 'admin'){
window.location.href = 'admin.html';
} else {
window.location.href = 'app-with-demo.html';
}
}, 1000);
}

function cancelActivation(){
showForm('loginForm');
document.getElementById('info').classList.remove('show');
document.getElementById('activationCode').value = '';
}

function getDeviceFingerprint(){
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
ctx.textBaseline = 'top';
ctx.font = '14px Arial';
ctx.fillText('fingerprint', 2, 2);
const canvasData = canvas.toDataURL();
const hash = canvasData.split('').reduce((a,b)=>{a=((a<<5)-a)+b.charCodeAt(0);return a&a},0);
return Math.abs(hash).toString(36) + '-' + navigator.userAgent.length + '-' + screen.width + 'x' + screen.height;
}

// Скрыть ошибки при вводе
['username','password','activationCode'].forEach(id => {
const el = document.getElementById(id);
if(el){
el.addEventListener('input', () => {
document.getElementById('error').classList.remove('show');
});
}
});
</script>

</body>
</html>
